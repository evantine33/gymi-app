[build]
  command   = "npm run build"
  publish   = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from   = "/"
  to     = "/landing.html"
  status = 200
  force  = true

[[redirects]]
  from   = "/consumer"
  to     = "/consumer.html"
  status = 200

[[redirects]]
  from   = "/privacypolicy"
  to     = "/privacypolicy.html"
  status = 200

[[redirects]]
  from   = "/terms"
  to     = "/terms.html"
  status = 200

[[redirects]]
  from   = "/support"
  to     = "/support.html"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
